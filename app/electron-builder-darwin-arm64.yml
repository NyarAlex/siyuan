# Renamed from "SiYuan" so this fork installs/runs alongside the official app
# (separate bundle id, app name, and ~/Library/Application Support dir).
productName: "SiYuan-Outliner"
appId: "org.b3log.siyuan-outliner"
asar: false
compression: "normal"
copyright: "© 2020-present Yunnan Liandi Technology Co., Ltd."
artifactName: "siyuan-outliner-${version}-${os}-arm64.${ext}"
extraMetadata:
  main: "electron/main.js"
  # app.getName() drives Electron's single-instance lock and the userData dir
  # (main.js appends "-Electron"). It must differ from the official app's
  # "SiYuan", or this build silently quits at launch whenever official SiYuan
  # is running.
  name: "SiYuan-Outliner"
directories:
  output: "build"
files:
  - "electron"
afterPack: "./scripts/afterPack.js"

mac:
  # Local unsigned build: no signing identity / provisioning profile / MAS
  # entitlements on this machine (identity null = ad-hoc signature).
  identity: null
  icon: "src/assets/icon.icns"
  gatekeeperAssess: false
  extendInfo:
    - NSMicrophoneUsageDescription: "This app requires microphone access to record audio."
  minimumSystemVersion: "12.0.0"
  # No siyuan:// protocol registration — the official app on this machine keeps
  # sole ownership of the URL scheme.
  extraResources:
    - from: "kernel-darwin-arm64"
      to: "kernel"
  target:
    - target: "dir"
      arch: "arm64"

extraResources:
  - from: "changelogs"
    to: "changelogs"
  - from: "stage"
    to: "stage"
  - from: "guide"
    to: "guide"
    filter: "!**/{.DS_Store,.git,.gitignore,.idea}"
  - from: "appearance/boot"
    to: "appearance/boot"
    filter: "!**/{.DS_Store}"
  - from: "appearance/icons"
    to: "appearance/icons"
    filter: "!**/{.DS_Store}"
  - from: "appearance/langs"
    to: "appearance/langs"
    filter: "!**/{.DS_Store}"
  - from: "appearance/emojis"
    to: "appearance/emojis"
    filter: "!**/{.DS_Store}"
  - from: "appearance/themes/midnight"
    to: "appearance/themes/midnight"
    filter: "!**/{.DS_Store,custom.css}"
  - from: "appearance/themes/daylight"
    to: "appearance/themes/daylight"
    filter: "!**/{.DS_Store,custom.css}"
  - from: "appearance/fonts"
    to: "appearance/fonts"
    filter: "!**/{.DS_Store}"
  - from: "pandoc/pandoc-darwin-arm64.zip"
    to: "pandoc.zip"
  - from: "pandoc/pandoc-resources"
    to: "pandoc-resources"
    filter: "!**/{.DS_Store}"
